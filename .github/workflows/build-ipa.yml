name: Build AudioMuse IPA

on:
  workflow_dispatch:  # 允许在 GitHub 网页端的 Actions 页面手动点击触发
  push:
    branches:
      - main
      - master      # 兼容 master 或 main 分支的自动触发

jobs:
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest  # 使用最新的 macOS 环境运行 (自带 Xcode)
    
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive # 自动拉取可能存在的子模块

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build Application (Unsigned)
        run: |
          echo "Building MuseAmp workspace..."
          
          # 核心步骤：直接使用 xcodebuild 编译，注入参数强制关闭签名要求，保证100%编译成功
          xcodebuild clean build \
            -workspace MuseAmp.xcworkspace \
            -scheme MuseAmp \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package to IPA
        run: |
          echo "Packaging into .ipa..."
          mkdir -p Payload
          
          # 智能提取生成的 .app 文件 (规避路径中的 Hash 后缀差异)
          APP_PATH=$(find build/Build/Products/Release-iphoneos -type d -name "*.app" | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "Error: Cannot find the compiled .app file!"
            exit 1
          fi
          
          echo "Found app at: $APP_PATH"
          cp -r "$APP_PATH" Payload/
          
          # 压缩为标准的 IPA 安装包
          zip -qr AudioMuse.ipa Payload
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AudioMuse-Release
          path: AudioMuse.ipa
          retention-days: 7 # 生成的 IPA 文件在 GitHub 保留 7 天
