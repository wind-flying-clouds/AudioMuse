name: Build AudioMuse IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-ios:
    name: Build iOS IPA
    runs-on: macos-15  # 强制使用最新的 macOS 15 镜像 (比 macos-latest 搭载的 Xcode 更新)
    
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive # 必须带上这个，因为报错的库都是仓库里的子模块

      - name: Select the Latest Xcode
        run: |
          echo "Finding the latest Xcode installed on the GitHub Runner..."
          # 自动寻找 Runner 上安装的最高版本 Xcode (如 Xcode_16.3.app 或 Xcode_17.app)
          LATEST_XCODE=$(ls -d /Applications/Xcode*.app | sort -V | tail -n 1)
          echo "Selecting: $LATEST_XCODE"
          sudo xcode-select -s "$LATEST_XCODE"
          
          # 打印验证当前选中的 Xcode 和 Swift 版本
          xcodebuild -version
          swift --version

      - name: Downgrade Swift Tools Version (Compatibility Patch)
        run: |
          echo "Patching swift-tools-version from 6.2.x to 6.1.0 in all Package.swift files..."
          # 核心修复方案：批量强行改写所有 Package.swift，将要求的 6.2.x 版本降级为 6.1.0
          # 这只是放宽了 SPM 的环境限制，不会影响任何实际代码的编译。
          find . -type f -name "Package.swift" -exec sed -i '' -E 's/swift-tools-version:[[:space:]]*6\.[2-9].*/swift-tools-version: 6.1.0/g' {} +
          
          # 打印修改后的文件确认是否替换成功
          find . -type f -name "Package.swift" -exec head -n 1 {} \;

      - name: Build Application (Unsigned)
        run: |
          echo "Building MuseAmp workspace..."
          
          # 执行编译，强制关闭签名机制
          xcodebuild clean build \
            -workspace MuseAmp.xcworkspace \
            -scheme MuseAmp \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package to IPA
        run: |
          echo "Packaging into .ipa..."
          mkdir -p Payload
          
          # 智能提取生成的 .app 文件
          APP_PATH=$(find build/Build/Products/Release-iphoneos -type d -name "*.app" | head -n 1)
          
          if[ -z "$APP_PATH" ]; then
            echo "Error: Cannot find the compiled .app file!"
            exit 1
          fi
          
          echo "Found app at: $APP_PATH"
          cp -r "$APP_PATH" Payload/
          
          # 压缩成 IPA 文件
          zip -qr AudioMuse.ipa Payload
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AudioMuse-Release
          path: AudioMuse.ipa
          retention-days: 7
